name: Lint & Format

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'package.json'
      - 'yarn.lock'
      - '.eslintrc*'
      - '.prettierrc*'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'yarn.lock'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: ESLint (Next.js)
        run: yarn lint

      - name: Prettier check
        run: yarn prettier --check "src/**/*.{js,jsx}"
