name: Deploy website to GitHub Pages

# NOTE: le site est déployé sur Vercel (https://nkaurelien.kamitbrains.fr —
# l'app inclut des Route Handlers serveur incompatibles avec l'export statique).
# GitHub Pages ne sert plus qu'une PAGE DE REDIRECTION (redirect-page/) qui
# préserve le chemin : nkaurelien.github.io/fr/blog/... → kamitbrains.fr/fr/blog/...
# (index.html = accueil, 404.html = tout lien profond de l'ancien snapshot).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'redirect-page/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disable Jekyll processing
        run: touch ./redirect-page/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload redirect page
        uses: actions/upload-pages-artifact@v3
        with:
          path: redirect-page

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
