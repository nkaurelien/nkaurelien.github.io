name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'yarn.lock'
      - 'next.config.mjs'
      - 'postcss.config.mjs'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # User-site nkaurelien.github.io : servi a la racine -> basePath vide (defaut).
    # Pour un domaine perso, ajouter un fichier public/CNAME.
    env:
      # Clef de site hCaptcha (publique, pas un secret) pour nkaurelien.github.io.
      # Surchargeable via la variable de depot Actions `HCAPTCHA_SITEKEY`.
      NEXT_PUBLIC_HCAPTCHA_SITEKEY: ${{ vars.HCAPTCHA_SITEKEY || '4db67e92-9242-4c86-a21a-db88ec44de56' }}
      # Feature flag : protection hCaptcha du contact (actif par defaut).
      # Mettre la variable de depot `HCAPTCHA_ENABLED` a "false" pour desactiver.
      NEXT_PUBLIC_HCAPTCHA_ENABLED: ${{ vars.HCAPTCHA_ENABLED || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build static export
        run: yarn build

      - name: Disable Jekyll processing
        run: touch ./out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
